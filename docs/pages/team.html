<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BMBL Fantasy Baseball Prospects</title>

    <link rel="stylesheet" href="../css/style.css">
</head>


<body>

<header>

    <div class="header-main">

        <img 
            src="https://yahoofantasysports-res.cloudinary.com/image/upload/t_s192sq/fantasy-logos/9d58feca49a48d6bb4630f3c56dfe766cd0d041142caff43369a8b04b5085c9e.png"
            class="site-logo"
            alt="Bust Mode Baseball League Logo"
        >

        <h1>
            Bust Mode Baseball League Prospects
        </h1>

    </div>


    <nav>

        <a href="../index.html">
            All Players
        </a>

        <a href="prospects.html">
            Prospects
        </a>

        <a href="team.html">
            Teams
        </a>

        <a href="systemranks.html">
            System Ranks
        </a>

        <a href="mlbclubs.html">
            MLB Clubs
        </a>
    </nav>


</header>


<main>

    <div id="team-container" class="team-grid"></div>

</main>


<script>

async function loadTeams() {

    const response = await fetch("../data/public/teams.json");
    const teams = await response.json();

    const container = document.getElementById("team-container");


    teams.forEach(team => {

        const card = document.createElement("a");

        card.href = `team_roster.html?team_id=${team.team_id}`;

        card.className = "team-card";


        card.style.backgroundColor = team.primary_color;
        card.style.color = team.secondary_color;
        card.style.borderColor = team.secondary_color;


        card.innerHTML = `

            <div class="team-card-name">
                ${team.name}
            </div>

        `;


        container.appendChild(card);

    });

}


loadTeams();

</script>


</body>
</html>
