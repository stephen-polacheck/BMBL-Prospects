<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BMBL Fantasy Baseball Prospects</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>


<header>

    <div class="header-main">

        <img 
            src="https://yahoofantasysports-res.cloudinary.com/image/upload/t_s192sq/fantasy-logos/9d58feca49a48d6bb4630f3c56dfe766cd0d041142caff43369a8b04b5085c9e.png"
            class="site-logo"
            alt="Bust Mode Baseball League Logo"
        >

        <h1>
            Bust Mode Baseball League Prospects
        </h1>

    </div>


    <nav>

        <a href="../index.html">
            All Players
        </a>

        <a href="prospects.html">
            Prospects
        </a>

        <a href="team.html">
            Teams
        </a>

        <a href="systemranks.html">
            System Ranks
        </a>

        <a href="mlbclubs.html">
            MLB Clubs
        </a>

    </nav>


</header>



<main id="team-page">


    <section id="team-header"></section>

    <table id="player-table" class="analytics-table">


        <thead>

            <tr>

                <th data-column="team-rank">TM</th>

                <th data-column="overall-rank">OVR</th>

                <th data-column="prospect-rank">PR</th>

                <th data-column="team-prospect-rank">TPR</th>

                <th data-column="name">Name</th>

                <th data-column="mlb">MLB</th>

                <th data-column="position">Pos</th>

                <th data-column="age">Age</th>

                <th data-column="level">Lvl</th>

                <th data-column="value">Value</th>

                <th data-column="fantasy-team">Team</th>

            </tr>

        </thead>


        <tbody></tbody>


    </table>


</main>


<script src="../js/app.js"></script>

<script>


async function loadTeamPage() {


    const params =
        new URLSearchParams(window.location.search);


    const abbrev =
        params.get("team");


    if (!abbrev) {

        console.error("No MLB abbreviation found");

        return;

    }


    console.log("Selected MLB Team:", abbrev);



    const playersResponse =
        await fetch("../data/public/prospect_list.json");


    const players =
        await playersResponse.json();



    const teamsResponse =
        await fetch("../data/public/mlb_teams.json")


    const teams =
        await teamsResponse.json();



    const team =
        teams.find(
            t => t.abbrev === abbrev
        );



    if (!team) {

        console.error("Team not found:", teamId);

        return;

    }


    console.log("Selected Team:", team);

    // -----------------------------------
    // Overall Rank
    // -----------------------------------

    const sortedPlayers = [...players].sort(
        (a, b) => b.value - a.value
    );

    sortedPlayers.forEach((player, index) => {

        player.overall_rank = index + 1;

    });


    // -----------------------------------
    // Overall Prospect Rank
    // -----------------------------------

    const sortedProspects = sortedPlayers.filter(
        player => player.prospect
    );

    sortedProspects.forEach((player, index) => {

        player.prospect_rank = index + 1;

    });


    // -----------------------------------
    // Filter selected fantasy team
    // -----------------------------------

    const roster =
        players.filter(
            player =>
                player.mlb &&
                player.mlb.abbrev === abbrev
        );

    // -----------------------------------
    // Team Rank
    // -----------------------------------

    const sortedRoster = [...roster].sort(
        (a, b) => b.value - a.value
    );

    sortedRoster.forEach((player, index) => {

        player.team_rank = index + 1;

    });


    // -----------------------------------
    // Team Prospect Rank
    // -----------------------------------

    const teamProspects =
        sortedRoster.filter(
            player => player.prospect
        );

    teamProspects.forEach((player, index) => {

        player.team_prospect_rank = index + 1;

    });
    
    renderPlayers(roster);
    
    renderTeamHeader(team);

}



function renderTeamHeader(team) {


    const header =
        document.getElementById("team-header");


    header.innerHTML = `

        <div class="team-header-content">

            <img 
            src="${team.logoroundel}"
            class="team-logo"
            >

            <div>

                <h1>
                    ${team.name}
                </h1>
            </div>

        </div>

    `;


    header.style.backgroundColor =
    team.primary;


    header.style.color =
        team.secondary;


    header.style.setProperty(
        "--secondary",
        team.secondary
    );


    document.getElementById("team-page").style.backgroundColor =
        team.primary;

}



function renderPlayers(players) {


    const tbody =
        document.querySelector("#player-table tbody");


    tbody.innerHTML = "";



    players.forEach(player => {


        const row =
            document.createElement("tr");

            applyRowClasses(row, player);


        row.innerHTML = `

            <td data-column="team-rank">
                ${player.team_rank ?? ""}
            </td>

            <td data-column="overall-rank">
                ${player.overall_rank ?? ""}
            </td>

            <td data-column="prospect-rank">
                ${player.prospect ? player.prospect_rank : ""}
            </td>

            <td data-column="team-prospect-rank">
                ${player.prospect ? player.team_prospect_rank : ""}
            </td>


            <td data-column="name">
                ${player.name}
            </td>


            <td data-column="mlb">
                ${renderMLBTeam(player.mlb)}
            </td>


            <td data-column="position">
                ${player.positions?.join(", ") ?? ""}
            </td>


            <td data-column="age">
                ${player.age ?? ""}
            </td>


            <td data-column="level">
                ${renderLevel(player.level)}
            </td>


            <td data-column="value">
                ${player.value ?? ""}
            </td>

            <td data-column="fantasy-team">
                ${renderFantasyTeam(player.fantasy)}
            </td>

        `;



        tbody.appendChild(row);


    });

}



loadTeamPage();


</script>


</body>
</html>
