<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BMBL Fantasy Baseball Prospects</title>

    <link rel="stylesheet" href="../css/style.css">
</head>


<body>

<header>

    <div class="header-main">

        <img 
            src="https://yahoofantasysports-res.cloudinary.com/image/upload/t_s192sq/fantasy-logos/9d58feca49a48d6bb4630f3c56dfe766cd0d041142caff43369a8b04b5085c9e.png"
            class="site-logo"
            alt="Bust Mode Baseball League Logo"
        >

        <h1>
            Bust Mode Baseball League Prospects
        </h1>

    </div>


    <nav>

        <a href="../index.html">
            All Players
        </a>

        <a href="prospects.html">
            Prospects
        </a>

        <a href="team.html">
            Teams
        </a>

        <a href="systemranks.html">

        </a>

        <a href="mlbclubs.html">
            MLB Clubs
        </a>

    </nav>


</header>


<main>

<table id="player-table" class="analytics-table">

    <thead>

        <tr>
            <th data-column="rank">
                Rank
            </th>

            <th data-column="team_rank">
                Team Rank
            </th>

            <th data-column="name">
                Name
            </th>

            <th data-column="mlb">
                MLB
            </th>

            <th data-column="position">
                Position
            </th>

            <th data-column="age">
                Age
            </th>

            <th data-column="level">
                Level
            </th>

            <th data-column="value">
                Value
            </th>

            <th data-column="fantasy-team">
                Team
            </th>
        </tr>

    </thead>


<tbody id="playerTable" class="analytics-table">

</tbody>


</table>


</main>


<script src="../js/app.js"></script>

</body>

</html>
