name: Refresh BMBL Player Data


on:

  schedule:
    # Runs every morning at 6 AM UTC
    - cron: "0 8 * * *"

  # Allows you to manually run it from GitHub
  workflow_dispatch:


jobs:

  refresh:

    runs-on: ubuntu-latest


    permissions:
      contents: write


    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      - name: Install dependencies
        run: |
          pip install -r requirements.txt


      - name: Refresh player data
        run: |
          python data_pipeline/refresh_data.py


      - name: Commit updated JSON files
        run: |

          git config --global user.name "BMBL Data Bot"

          git config --global user.email "actions@github.com"

          git add .

          git commit -m "Automated BMBL data refresh" || echo "No changes detected"

          git push
